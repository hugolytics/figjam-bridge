<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      font-family: -apple-system, sans-serif;
      font-size: 12px;
      margin: 0;
      padding: 12px;
      background: #1e1e1e;
      color: #d4d4d4;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e05c5c;
    }
    .dot.connected { background: #5ce06a; }
    button {
      width: 100%;
      padding: 8px;
      margin-bottom: 8px;
      background: #3a3a3a;
      color: #d4d4d4;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    button:hover { background: #4a4a4a; }
    button:disabled { opacity: 0.4; cursor: default; }
    label {
      display: block;
      margin-bottom: 4px;
      color: #888;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    textarea {
      width: 100%;
      height: 120px;
      background: #2d2d2d;
      color: #d4d4d4;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 6px;
      font-family: monospace;
      font-size: 11px;
      resize: vertical;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="status-text">Disconnected</span>
  </div>
  <button id="btn-session">New Session</button>
  <button id="btn-ask" disabled>Ask Claude</button>
  <label>D2 Source</label>
  <textarea id="d2-source" readonly placeholder="No D2 yet"></textarea>

  <script>
    const dot = document.getElementById('dot');
    const statusText = document.getElementById('status-text');
    const btnSession = document.getElementById('btn-session');
    const btnAsk = document.getElementById('btn-ask');
    const d2Area = document.getElementById('d2-source');

    window.onmessage = ({ data: { pluginMessage: msg } }) => {
      if (!msg) return;
      if (msg.type === 'connection_status') {
        const connected = msg.connected;
        dot.className = 'dot' + (connected ? ' connected' : '');
        statusText.textContent = connected ? 'Connected' : 'Disconnected';
        btnAsk.disabled = !connected;
      }
      if (msg.type === 'd2_update') {
        d2Area.value = msg.d2_source;
      }
    };

    btnSession.onclick = () => parent.postMessage({ pluginMessage: { type: 'new_session' } }, '*');
    btnAsk.onclick = () => parent.postMessage({ pluginMessage: { type: 'ask_claude' } }, '*');
  </script>
</body>
</html>
