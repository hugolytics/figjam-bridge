<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, sans-serif;
      font-size: 12px;
      margin: 0;
      padding: 10px;
      background: #1e1e1e;
      color: #d4d4d4;
      display: flex;
      flex-direction: column;
      gap: 8px;
      height: 420px;
    }

    /* ---- Status bar ---- */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
    }
    .gear-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 14px;
      padding: 0 2px;
      line-height: 1;
    }
    .gear-btn:hover { color: #aaa; }
    .url-row {
      display: none;
      gap: 5px;
      flex-shrink: 0;
    }
    .url-row.open { display: flex; }
    .url-input {
      flex: 1;
      background: #252525;
      color: #d4d4d4;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 4px 7px;
      font-size: 11px;
      font-family: monospace;
      outline: none;
    }
    .url-input:focus { border-color: #4a90d9; }
    .url-save-btn {
      background: #3a3a3a;
      color: #ccc;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }
    .url-save-btn:hover { background: #4a4a4a; }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #c0392b;
      flex-shrink: 0;
    }
    .dot.connected { background: #27ae60; }
    .status-text { color: #888; }

    /* ---- Context panel ---- */
    .context-panel {
      border: 1px solid #333;
      border-radius: 5px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .context-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 9px;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
      background: #252525;
    }
    .context-header:hover { background: #2d2d2d; }
    .context-header-left {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
      color: #ccc;
    }
    .chevron {
      font-size: 9px;
      color: #666;
      transition: transform 0.15s;
      display: inline-block;
    }
    .chevron.open { transform: rotate(90deg); }
    .badge {
      background: #3a3a3a;
      color: #aaa;
      border-radius: 9px;
      padding: 1px 6px;
      font-size: 10px;
    }

    .context-body {
      display: none;
      flex-direction: column;
    }
    .context-body.open { display: flex; }

    .item-list {
      max-height: 152px;
      overflow-y: auto;
      padding: 4px 0;
    }
    .item-list::-webkit-scrollbar { width: 4px; }
    .item-list::-webkit-scrollbar-track { background: transparent; }
    .item-list::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

    .item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 9px;
      cursor: default;
    }
    .item:hover { background: #2a2a2a; }

    .item input[type="checkbox"] {
      width: 13px; height: 13px;
      margin: 0;
      cursor: pointer;
      accent-color: #4a90d9;
      flex-shrink: 0;
    }
    .item-icon {
      width: 16px;
      text-align: center;
      color: #777;
      font-size: 11px;
      flex-shrink: 0;
    }
    .item-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #ccc;
      cursor: pointer;
    }
    .item-label:hover { color: #fff; text-decoration: underline; }

    .empty-state {
      padding: 10px 9px;
      color: #555;
      font-style: italic;
      font-size: 11px;
    }

    .add-row {
      display: flex;
      border-top: 1px solid #2e2e2e;
    }
    .add-btn {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 9px;
      cursor: pointer;
      color: #4a90d9;
      font-size: 11px;
      background: none;
      border: none;
      border-right: 1px solid #2e2e2e;
      text-align: left;
    }
    .add-btn:hover { background: #252525; color: #6baee8; }
    .add-btn:disabled { color: #444; cursor: default; }
    .add-btn:disabled:hover { background: none; }
    .add-all-btn {
      display: flex;
      align-items: center;
      padding: 6px 9px;
      cursor: pointer;
      color: #888;
      font-size: 11px;
      background: none;
      border: none;
      white-space: nowrap;
    }
    .add-all-btn:hover { background: #252525; color: #aaa; }
    .watch-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 9px;
      border-top: 1px solid #2e2e2e;
      cursor: pointer;
      color: #777;
      font-size: 11px;
    }
    .watch-row:hover { color: #aaa; }
    .watch-row input { cursor: pointer; accent-color: #4a90d9; margin: 0; }

    /* ---- Divider ---- */
    .divider {
      height: 1px;
      background: #2e2e2e;
      flex-shrink: 0;
    }

    /* ---- Chat ---- */
    .chat-area {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-height: 0;
    }
    textarea {
      flex: 1;
      min-height: 60px;
      background: #252525;
      color: #d4d4d4;
      border: 1px solid #383838;
      border-radius: 4px;
      padding: 7px 8px;
      font-family: inherit;
      font-size: 12px;
      resize: none;
      outline: none;
      line-height: 1.45;
    }
    textarea:focus { border-color: #4a90d9; }
    textarea::placeholder { color: #444; }
    textarea:disabled { opacity: 0.5; }

    .send-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #5a9fe8; }
    .send-btn:disabled { background: #2e2e2e; color: #555; cursor: default; }
  </style>
</head>
<body>
  <!-- Status -->
  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span class="status-text" id="status-text">Connecting…</span>
    <button type="button" class="gear-btn" id="gear-btn" title="Configure bridge URL">⚙</button>
  </div>
  <div class="url-row" id="url-row">
    <input type="text" class="url-input" id="url-input" placeholder="ws://localhost:3100" spellcheck="false" />
    <button type="button" class="url-save-btn" id="url-save-btn">Save</button>
  </div>

  <!-- Canvas Context -->
  <div class="context-panel">
    <div class="context-header" id="context-header">
      <div class="context-header-left">
        <span class="chevron open" id="chevron">&#9658;</span>
        Canvas Context
      </div>
      <span class="badge" id="badge">0</span>
    </div>
    <div class="context-body open" id="context-body">
      <div class="item-list" id="item-list">
        <div class="empty-state">Select nodes on the canvas, then click Add.</div>
      </div>
      <div class="add-row">
        <button type="button" class="add-btn" id="add-btn" disabled>+ Add Selection</button>
        <button type="button" class="add-all-btn" id="add-all-btn">+ Add All</button>
      </div>
      <label class="watch-row">
        <input type="checkbox" id="watch-all-cb" />
        <span>Auto-add new nodes</span>
      </label>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Chat -->
  <div class="chat-area">
    <textarea id="chat-input" placeholder="Tell Claude what to look at…" disabled></textarea>
    <button type="button" class="send-btn" id="send-btn" disabled>Send to Claude ↗</button>
  </div>

  <script>
    const dot = document.getElementById('dot');
    const statusText = document.getElementById('status-text');
    const gearBtn = document.getElementById('gear-btn');
    const urlRow = document.getElementById('url-row');
    const urlInput = document.getElementById('url-input');
    const urlSaveBtn = document.getElementById('url-save-btn');
    const chevron = document.getElementById('chevron');
    const contextBody = document.getElementById('context-body');
    const badge = document.getElementById('badge');
    const itemList = document.getElementById('item-list');
    const addBtn = document.getElementById('add-btn');
    const addAllBtn = document.getElementById('add-all-btn');
    const watchAllCb = document.getElementById('watch-all-cb');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');

    let ws = null;
    let connected = false;
    let bridgeUrl = null; // set by init message from code.js
    let selectionCount = 0;
    let associated = [];
    let pendingText = '';

    // ---- Gear / URL config ----
    gearBtn.addEventListener('click', () => urlRow.classList.toggle('open'));

    urlSaveBtn.addEventListener('click', () => {
      const url = urlInput.value.trim();
      if (!url) return;
      bridgeUrl = url;
      urlRow.classList.remove('open');
      parent.postMessage({ pluginMessage: { type: 'save_bridge_url', url } }, '*');
      // Reconnect with new URL
      if (ws) ws.close();
    });

    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') urlSaveBtn.click();
    });

    // ---- WebSocket — only called after bridgeUrl is set ----
    function connect() {
      if (!bridgeUrl) return;
      ws = new WebSocket(bridgeUrl);

      ws.onopen = () => {
        connected = true;
        dot.className = 'dot connected';
        statusText.textContent = 'Connected';
        chatInput.disabled = false;
        updateSendBtn();
        parent.postMessage({ pluginMessage: { type: 'get_associated' } }, '*');
      };

      ws.onclose = () => {
        connected = false;
        dot.className = 'dot';
        statusText.textContent = 'Disconnected';
        chatInput.disabled = true;
        updateSendBtn();
        setTimeout(connect, 3000);
      };

      ws.onerror = () => ws.close();

      // Bridge → plugin: forward MCP commands to code.js
      ws.onmessage = (event) => {
        const cmd = JSON.parse(event.data);
        parent.postMessage({ pluginMessage: cmd }, '*');
      };
    }
    connect();

    function sendToBridge(data) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(data));
      }
    }

    function bytesToBase64(bytes) {
      const arr = new Uint8Array(bytes);
      let bin = '';
      for (let i = 0; i < arr.length; i++) bin += String.fromCharCode(arr[i]);
      return btoa(bin);
    }

    // ---- Context accordion ----
    document.getElementById('context-header').addEventListener('click', () => {
      const isOpen = contextBody.classList.toggle('open');
      chevron.classList.toggle('open', isOpen);
    });

    // ---- Render item list ----
    function renderList() {
      badge.textContent = associated.length;
      if (associated.length === 0) {
        itemList.innerHTML = '<div class="empty-state">Select nodes on the canvas, then click Add.</div>';
        return;
      }
      itemList.innerHTML = '';
      associated.forEach(item => {
        const row = document.createElement('div');
        row.className = 'item';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = true;
        cb.title = 'Remove from context';

        const icon = document.createElement('span');
        icon.className = 'item-icon';
        icon.textContent = item.icon;

        const label = document.createElement('span');
        label.className = 'item-label';
        label.textContent = item.label;
        label.title = `${item.type}: ${item.label} — click to focus`;

        // Hover: highlight on canvas
        row.addEventListener('mouseenter', () => {
          parent.postMessage({ pluginMessage: { type: 'hover_node', id: item.id } }, '*');
        });
        row.addEventListener('mouseleave', () => {
          parent.postMessage({ pluginMessage: { type: 'unhover_node' } }, '*');
        });

        // Click label: zoom to node
        label.addEventListener('click', (e) => {
          e.stopPropagation();
          parent.postMessage({ pluginMessage: { type: 'focus_node', id: item.id } }, '*');
        });

        // Uncheck: remove from context
        cb.addEventListener('change', () => {
          parent.postMessage({ pluginMessage: { type: 'remove_node', id: item.id } }, '*');
        });

        row.appendChild(cb);
        row.appendChild(icon);
        row.appendChild(label);
        itemList.appendChild(row);
      });
    }

    // ---- Add selection ----
    addBtn.addEventListener('click', () => {
      parent.postMessage({ pluginMessage: { type: 'add_selection' } }, '*');
    });

    addAllBtn.addEventListener('click', () => {
      parent.postMessage({ pluginMessage: { type: 'add_all' } }, '*');
    });

    watchAllCb.addEventListener('change', () => {
      parent.postMessage({ pluginMessage: { type: 'set_watch_all', enabled: watchAllCb.checked } }, '*');
    });

    // ---- Send ----
    function updateSendBtn() {
      sendBtn.disabled = !connected || chatInput.value.trim() === '';
    }

    chatInput.addEventListener('input', updateSendBtn);

    sendBtn.addEventListener('click', () => {
      const text = chatInput.value.trim();
      if (!text || !connected) return;
      pendingText = text;
      chatInput.disabled = true;
      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending…';
      // Ask code.js for a snapshot of associated nodes
      parent.postMessage({ pluginMessage: { type: 'get_snapshot_for_send' } }, '*');
    });

    // ---- Messages from code.js ----
    window.onmessage = ({ data: { pluginMessage: msg } }) => {
      if (!msg) return;

      if (msg.type === 'selection_changed') {
        selectionCount = msg.count;
        addBtn.disabled = msg.count === 0;
        addBtn.textContent = msg.count > 0
          ? `+ Add Selection (${msg.count} selected)`
          : '+ Add Selection';
        return;
      }

      if (msg.type === 'associated_updated') {
        associated = msg.items;
        renderList();
        // Open panel if items were just added
        if (associated.length > 0 && !contextBody.classList.contains('open')) {
          contextBody.classList.add('open');
          chevron.classList.add('open');
        }
        return;
      }

      // Init: code.js sends saved bridge URL on startup
      if (msg.type === 'init') {
        bridgeUrl = msg.bridgeUrl;
        urlInput.value = bridgeUrl;
        connect();
        return;
      }

      // Snapshot ready — forward as user_message event to bridge
      if (msg.type === 'snapshot_for_send') {
        sendToBridge({ event: 'user_message', text: pendingText, payload: msg.payload });
        pendingText = '';
        chatInput.value = '';
        chatInput.disabled = false;
        sendBtn.textContent = 'Send to Claude ↗';
        updateSendBtn();
        return;
      }

      // Bridge response for MCP tool calls
      if (msg.type === 'bridge_response') {
        sendToBridge({ id: msg.id, result: msg.result });
        return;
      }

      if (msg.type === 'snapshot_result') {
        const payload = Object.assign({}, msg.payload, {
          snapshot_png: msg.pngBytes ? bytesToBase64(msg.pngBytes) : '',
        });
        sendToBridge({ id: msg.id, result: payload });
        return;
      }

      if (msg.type === 'd2_update') {
        // could show in a collapsed section later
        return;
      }
    };

  </script>
</body>
</html>
